logDir: "/var/log/oracle-cloud-agent"
agentHardStopInterval: "25s"
pluginHardStopInterval: "20s"
pluginHealthCheckInterval: "10m"
logAllResources: false
plugins:
  gomon:
    disabled: false
    exec: "/usr/lib/oracle-cloud-agent/plugins/gomon/gomon"
    winexec: ""
    elevated: false
    args: []
    resourceConstraints:
      cpu: 1
      memory: 1
  unifiedmonitoring:
    disableByOs:
      - "CentOS Linux":
          - "6.x"
      - "Oracle Linux Server":
          - "6.x"
    disableByRealm: []
    disableByShape:
      - "VM.Standard.E2.1.Micro"
    disabled: false
    exec: "/usr/lib/oracle-cloud-agent/plugins/unifiedmonitoring/unifiedmonitoring"
    winexec: ""
    args: []
    resourceConstraints:
      cpu: 1
      memory: 1
