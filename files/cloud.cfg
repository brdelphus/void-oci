datasource_list: [@@DATASOURCE@@]

disable_root: true
ssh_pwauth: true
resize_rootfs: true

users:
  - name: void
    groups: [wheel, adm]
    lock_passwd: false
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL

system_info:
  default_user:
    name: void
    lock_passwd: false
    groups: [wheel, adm]
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    shell: /bin/bash

datasource:
  Oracle:
    max_wait: 60
    timeout: 10

bootcmd:
  - |
    KEY=$(curl -sf --connect-timeout 15 --retry 5 \
      http://169.254.169.254/opc/v1/instance/metadata/ssh_authorized_keys 2>/dev/null)
    if [ -n "$KEY" ]; then
      mkdir -p /home/void/.ssh
      echo "$KEY" > /home/void/.ssh/authorized_keys
      chmod 700 /home/void/.ssh
      chmod 600 /home/void/.ssh/authorized_keys
      chown -R void:void /home/void/.ssh
    fi

cloud_init_modules:
  - seed_random
  - bootcmd
  - write-files
  - growpart
  - resizefs
  - disk_setup
  - mounts
  - set_hostname
  - update_hostname
  - update_etc_hosts
  - ca-certs
  - users-groups
  - ssh

cloud_config_modules:
  - keyboard
  - locale
  - set-passwords
  - ntp
  - timezone
  - runcmd

cloud_final_modules:
  - scripts-vendor
  - scripts-per-once
  - scripts-per-boot
  - scripts-per-instance
  - scripts-user
  - ssh-authkey-fingerprints
  - keys-to-console
  - install-hotplug
  - final-message
  - power-state-change
